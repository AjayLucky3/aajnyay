<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AajNyay | India's Legal GPS</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Mesh background layers -->
  <div class="bg-mesh-container">
    <div class="mesh-glow mesh-glow-1" style="opacity: 0.1;"></div>
    <div class="mesh-glow mesh-glow-2" style="opacity: 0.1;"></div>
  </div>

  <!-- Navigation Bar -->
  <nav class="navbar scrolled">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <i data-lucide="scale"></i>
        </div>
        Aaj<span>Nyay</span>
      </a>
      
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="gps.html" class="nav-link">Legal GPS</a></li>
        <li><a href="library.html" class="nav-link">Rights Library</a></li>
        <li><a href="assistant.html" class="nav-link">AI Navigator</a></li>
      </ul>
    </div>
  </nav>

  <!-- Login Card Form -->
  <main class="section-wrapper" style="padding-top: 8rem; min-height: 80vh; display:flex; align-items:center; justify-content:center;">
    
    <div class="glass-panel reveal active auth-card">
      <div style="text-align:center; margin-bottom:2rem;">
        <h2 style="font-size:1.8rem; color:var(--text-main); margin-bottom:0.5rem;">Welcome Back</h2>
        <p class="text-muted">Sign in to track your active legal journeys and roadmaps.</p>
      </div>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div style="display:flex; flex-direction:column; gap:1.25rem;">
          <div>
            <label style="font-size:0.85rem; font-weight:700; color:var(--text-main); margin-bottom:0.4rem; display:block;">Email Address</label>
            <input type="email" id="login-email" class="gps-text-input" placeholder="e.g. rajesh@example.com" required>
          </div>
          
          <div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.4rem;">
              <label style="font-size:0.85rem; font-weight:700; color:var(--text-main);">Password</label>
              <a href="javascript:void(0)" onclick="handleForgotPassword()" style="font-size:0.8rem; color:var(--accent); font-weight:600;">Forgot Password?</a>
            </div>
            <input type="password" id="login-password" class="gps-text-input" placeholder="Enter your password" required>
          </div>
          
          <button type="submit" class="btn btn-primary w-full" style="margin-top:0.5rem;">Sign In <i data-lucide="log-in"></i></button>
        </div>
      </form>
      
      <div style="text-align:center; margin-top:1.5rem; font-size:0.9rem;">
        <span class="text-muted">Don't have an account?</span>
        <a href="register.html" style="color:var(--accent); font-weight:700; margin-left:0.25rem;">Create Account</a>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-bottom" style="border-top:none; padding-top:0;">
      <p class="text-muted">&copy; 2026 AajNyay. All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (window.lucide) {
      window.lucide.createIcons();
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      
      try {
        await window.AajNyayAuth.login(email, pass);
        // Redirect to dashboard on success
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } catch (err) {
        // Handled inside auth.js toast
      }
    }
    
    function handleForgotPassword() {
      const email = document.getElementById('login-email').value;
      if (!email) {
        window.showToast('Please enter your email address to reset password', 'error');
        return;
      }
      window.showToast(`A password reset link has been dispatched to ${email}`, 'success');
    }
  </script>
</body>
</html>
